# ==========================================================
# Configuration pour le Profil de Développement (DEV)
# ==========================================================

# URL de connexion à la base de données que vous venez de créer
spring.datasource.url=jdbc:mysql://localhost:3306/tp_etudiants_dev?useSSL=false&serverTimezone=UTC

# Identifiants de connexion (Par défaut sur XAMPP : root sans mot de passe)
spring.datasource.username=root
spring.datasource.password=

# Driver de connexion MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialecte Hibernate pour MySQL 8+
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Met à jour automatiquement les tables dans MySQL en fonction de vos entités Java
spring.jpa.hibernate.ddl-auto=create

# Affiche les requêtes SQL dans la console pour faciliter le débogage
spring.jpa.show-sql=true

# Chemins Swagger UI et OpenAPI (valeurs par défaut, cohérentes avec SecurityConfig)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Configuration JWT
jwt.secret=votreCleSecreteTresLongueEtSecuriseeQuiFaitAuMoins256Bits123456
jwt.expiration=86400000

# Désactive l'ouverture de session pendant le rendu des vues (bonne pratique)
spring.jpa.open-in-view=false