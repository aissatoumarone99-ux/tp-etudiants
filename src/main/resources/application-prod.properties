# ==========================================================
# Profil PROD - Base de données isepat_cloud
# ==========================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/isepat_cloud?useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:isepat_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate : en production, on ne modifie pas le schéma automatiquement
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logs restreints en production
logging.level.org.hibernate.SQL=WARN
logging.level.sn.isepat.tpetudiants=INFO