# ==========================================================
# Profil DEV - Base de données isepat_dev
# ==========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/isepat_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logs plus verbeux en développement
logging.level.org.hibernate.SQL=DEBUG
logging.level.sn.isepat.tpetudiants=DEBUG